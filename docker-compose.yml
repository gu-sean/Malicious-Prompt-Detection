services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: prompt_guard
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api_server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql+aiomysql://user:user_password@db/prompt_guard
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=your_jwt_secret_key
    volumes:
      - ./server:/app
      - ./backend:/app/backend

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: always

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_server
      - frontend

volumes:
  db_data:

networks:
  default:
    name: malicious-prompt-detection-network
